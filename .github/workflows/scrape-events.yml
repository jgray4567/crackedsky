name: Scrape Facebook Events

on:
  schedule:
    - cron: '0 8 * * *' # Run daily at 8:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml dateparser
          playwright install chromium

      - name: Run scraper
        run: |
          python scripts/scrape_events.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update events.json" && git push)